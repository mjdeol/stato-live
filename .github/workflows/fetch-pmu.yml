name: Collecte PMU
on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python fetch_pmu.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: PMU du jour
          file_pattern: live.json
