name: Debug PMU champs

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Afficher tous les champs PMU
        run: python debug_pmu.py
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: debug partant JSON
          file_pattern: debug_partant.json
